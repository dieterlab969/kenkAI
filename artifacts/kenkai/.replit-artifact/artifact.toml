kind = "web"
previewPath = "/"
title = "KENKAI"
version = "1.0.0"
id = "artifacts/kenkai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26253

[services.development]
run = "pnpm --filter @workspace/kenkai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kenkai", "run", "build" ]
publicDir = "artifacts/kenkai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26253"
BASE_PATH = "/"
